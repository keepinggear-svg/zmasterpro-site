const $=id=>document.getElementById(id),favKey="word-flashcards-favorites-v4",bankKey="word-flashcards-bank-v1",wordRows=$("rows"),showBtn=$("show"),bookBtn=$("book");let i=0,mode="card",F=new Set(JSON.parse(localStorage.getItem(favKey)||"[]"));function wid(w){let x=String(w).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");return x||encodeURIComponent(w).replace(/%/g,"").toLowerCase()}function obj(x){let a=Array.isArray(x)?x:[x.w||x.word,x.pr||x.pronunciation,x.p||x.part,x.m||x.meaning,x.s||x.source];let w=String(a[0]||"").trim();if(!w)return null;let s=String(a[4]||"自定义").trim()||"自定义";return{w,pr:String(a[1]||"").trim(),p:String(a[2]||"自定义").trim()||"自定义",m:String(a[3]||"待补充释义").trim()||"待补充释义",s,id:wid(w)}}function norm(list){let m=new Map;(list||[]).forEach(x=>{x=obj(x);if(x)m.set(x.id,x)});return[...m.values()].sort((a,b)=>a.w.localeCompare(b.w,"en",{sensitivity:"base"}))}function loadBank(){try{let x=JSON.parse(localStorage.getItem(bankKey)||"null");return Array.isArray(x)&&x.length?x:null}catch{return null}}let W=norm(loadBank()||BASE);function saveFav(){localStorage.setItem(favKey,JSON.stringify([...F]))}function saveBank(){localStorage.setItem(bankKey,JSON.stringify(W.map(({w,pr,p,m,s})=>({w,pr,p,m,s}))))}function cur(){return W[i]}function msg(t,bad=false){$("bankMsg").textContent=t;$("bankMsg").className="msg"+(bad?" bad":"")}function total(){ $("total").textContent=W.length+" 个词";$("favN").textContent=W.filter(x=>F.has(x.id)).length+" 个收藏" }function resetQuiz(){ans.value="";fb.textContent="";fb.className="fb";reveal.hidden=true;reveal.textContent=""}function favUI(){let on=F.has(cur().id);[heart,qHeart].forEach(b=>{b.classList.toggle("on",on);b.textContent=on?"♥":"♡"});total()}function show(n=0){i=(n+W.length)%W.length;let w=cur(),num="#"+String(i+1).padStart(2,"0");pos.textContent=qPos.textContent=num;part.textContent=qPart.textContent=w.p;src.textContent=qSrc.textContent=w.s;word.textContent=w.w;word.classList.toggle("long",w.w.length>10);pron.textContent=w.pr;mean.textContent=w.m;note.textContent=w.s==="自定义"?"来自自定义词库。":"";prompt.textContent=w.m;card.classList.remove("flip");resetQuiz();favUI();renderRows();status.textContent="当前单词："+w.w}function rand(){if(W.length<2)return;show(i+Math.floor(Math.random()*(W.length-1))+1)}function next(){show(i+1)}function toggleFav(){let id=cur().id;F.has(id)?F.delete(id):F.add(id);saveFav();favUI();book()}function addFav(w){if(F.has(w.id))return false;F.add(w.id);saveFav();favUI();book();return true}function clean(s){return s.toLowerCase().replace(/[^a-z0-9]+/g," ").trim().replace(/\s+/g," ")}function checkAns(){let w=cur(),a=clean(ans.value),t=clean(w.w);if(!a){fb.textContent="先写一个答案。";fb.className="fb bad";return}if(a===t||a.replace(/\s/g,"")===t.replace(/\s/g,"")){fb.textContent="答对了";fb.className="fb ok";reveal.hidden=false;reveal.textContent=w.w+"  "+w.pr}else{fb.textContent=addFav(w)?"再想一下，已加入生词本":"再想一下，已在生词本";fb.className="fb bad"}}function answer(){let w=cur();reveal.hidden=false;reveal.textContent=w.w+"  "+w.pr;fb.textContent="答案已显示";fb.className="fb"}function renderRows(){wordRows.replaceChildren();W.forEach((w,n)=>{let b=document.createElement("button");b.className="row"+(n===i?" active":"");b.innerHTML="<strong>"+w.w+"</strong><span>"+w.p+" "+w.m+"</span>";b.onclick=()=>show(n);wordRows.append(b)})}function book(){bookList.replaceChildren();let a=W.filter(w=>F.has(w.id));if(!a.length){let d=document.createElement("div");d.className="empty";d.textContent="还没有收藏的单词。";bookList.append(d);return}a.forEach(w=>{let r=document.createElement("div");r.className="bookRow";r.innerHTML="<div><strong>"+w.w+"</strong><br><span>"+w.p+" "+w.m+"</span></div>";let x=document.createElement("button");x.className="btn warn";x.textContent="移除";x.onclick=()=>{F.delete(w.id);saveFav();favUI();book()};r.append(x);bookList.append(r)})}function bank(){bankList.replaceChildren();W.forEach((w,n)=>{let r=document.createElement("div");r.className="bankRow";r.innerHTML="<div><strong>"+w.w+"</strong><br><span>"+w.p+" "+w.m+"</span></div>";let x=document.createElement("button");x.className="btn warn";x.textContent="移除";x.disabled=W.length<=1;x.onclick=()=>{if(W.length<=1)return msg("词库里至少要保留 1 个词。",true);setBank(W.filter((_,j)=>j!==n),"已移除："+w.w)};r.append(x);bankList.append(r)})}function setBank(list,text){let n=norm(list);if(!n.length)return msg("没有识别到可导入的词。",true);W=n;i=0;saveBank();show(0);bank();msg(text)}function parseLine(line){let t=line.replace(/^\s*(?:[-*]|\d+[.)、])\s*/,"").trim();if(!t)return null;let f=t.split(/\s*\|\s*|\t+/).map(x=>x.trim()).filter(Boolean);if(f.length>=4)return{w:f[0],pr:f[1],p:f[2],m:f.slice(3).join("；"),s:"自定义"};if(f.length===3){let pr=/^\/.+\/$|^\[.+\]$/.test(f[1]);return{w:f[0],pr:pr?f[1]:"",p:pr?"自定义":f[1],m:f[2],s:"自定义"}}if(f.length===2)return{w:f[0],pr:"",p:"自定义",m:f[1],s:"自定义"};let sep=t.match(/^(.+?)\s*(?:,|，|=|：|:|\s[-–—]\s)\s*(.+)$/);if(sep)return{w:sep[1].trim(),pr:"",p:"自定义",m:sep[2].trim(),s:"自定义"};let c=t.search(/[\u3400-\u9fff]/);if(c>0){let h=t.slice(0,c).replace(/[-=:=：,，|]+$/g,"").trim(),m=t.slice(c).trim(),pm=h.match(/\/[^/]+\/|\[[^\]]+\]/),pr=pm?pm[0]:"",hp=pr?h.replace(pr,"").trim():h,pt=hp.match(/\b((?:n|v|adj|adv|num|prep|pron|conj|art)\.?(?:\s*\/\s*(?:n|v|adj|adv|num)\.?)*)$/i),p=pt?pt[1]:"",w=(p?hp.slice(0,pt.index).trim():hp).trim();return{w,pr,p,m,s:"自定义"}}return{w:t,pr:"",p:"自定义",m:"待补充释义",s:"自定义"}}function parseText(t){return t.split(/\r?\n/).map(parseLine).filter(x=>x&&x.w)}function importText(replace){let a=parseText(bankText.value);if(!a.length)return msg("没有识别到可导入的词。",true);if(replace)setBank(a,"已替换为 "+norm(a).length+" 个词。");else{let merged=[...W,...a];setBank(merged,"已导入 "+a.length+" 个词，当前词库 "+norm(merged).length+" 个词。");bankText.value=""}}function addQuick(){if(!quickWord.value.trim())return msg("先输入英文单词。",true);setBank([...W,{w:quickWord.value.trim(),pr:"",p:"自定义",m:quickMean.value.trim()||"待补充释义",s:"自定义"}],"已添加："+quickWord.value.trim());quickWord.value="";quickMean.value="";quickWord.focus()}function setMode(m){mode=m;cardMode.hidden=m==="quiz";quizMode.hidden=m!=="quiz";tabCard.classList.toggle("on",m==="card");tabQuiz.classList.toggle("on",m==="quiz");if(m==="quiz"){resetQuiz();setTimeout(()=>ans.focus(),0)}}function setList(open){list.hidden=!open;layout.classList.toggle("closed",!open);toggleList.textContent=open?"收起词表":"展开词表"}function openBook(){book();modal.hidden=false}function openBank(){bank();msg("当前词库 "+W.length+" 个词。");bankModal.hidden=false;quickWord.focus()}card.onclick=()=>card.classList.toggle("flip");card.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();card.click()}};flip.onclick=()=>card.click();rand.onclick=qRand.onclick=rand;next.onclick=qNext.onclick=next;heart.onclick=qHeart.onclick=toggleFav;check.onclick=checkAns;ans.onkeydown=e=>{if(e.key==="Enter")checkAns()};showBtn.onclick=answer;bookBtn.onclick=qBook.onclick=openBook;closeModal.onclick=()=>modal.hidden=true;modal.onclick=e=>{if(e.target===modal)modal.hidden=true};lib.onclick=openBank;closeBank.onclick=()=>bankModal.hidden=true;bankModal.onclick=e=>{if(e.target===bankModal)bankModal.hidden=true};quickAdd.onclick=addQuick;quickWord.onkeydown=quickMean.onkeydown=e=>{if(e.key==="Enter")addQuick()};appendBank.onclick=()=>importText(false);replaceBank.onclick=()=>importText(true);exportBank.onclick=()=>{bankText.value=W.map(w=>[w.w,w.pr,w.p,w.m].join(" | ")).join("\n");bankText.focus();bankText.select();msg("当前词库已放入编辑框。修改后点“替换词库”。")};resetBank.onclick=()=>{if(confirm("恢复默认 34 个词？当前自定义词库会被清空。")){localStorage.removeItem(bankKey);W=norm(BASE);show(0);bank();msg("已恢复默认词库。")}};tabCard.onclick=()=>setMode("card");tabQuiz.onclick=()=>setMode("quiz");toggleList.onclick=()=>setList(list.hidden);closeList.onclick=()=>setList(false);document.onkeydown=e=>{if(e.key==="Escape"){modal.hidden=true;bankModal.hidden=true}};show(0);setList(false);if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{
