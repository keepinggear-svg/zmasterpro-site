const $=id=>document.getElementById(id),favKey="word-flashcards-favorites-v5",bankKey="word-flashcards-bank-v2";let idx=0,mode="card",fav=new Set(JSON.parse(localStorage.getItem(favKey)||"[]"));function makeId(w){let x=String(w).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");return x||encodeURIComponent(w).replace(/%/g,"").toLowerCase()}function entry(x){let a=Array.isArray(x)?x:[x.w||x.word,x.pr||x.pronunciation,x.p||x.part,x.m||x.meaning,x.s||x.source];let w=String(a[0]||"").trim();if(!w)return null;let s=String(a[4]||"自定义").trim()||"自定义";return{w,pr:String(a[1]||"").trim(),p:String(a[2]||"自定义").trim()||"自定义",m:String(a[3]||"待补充释义").trim()||"待补充释义",s,id:makeId(w)}}function listNorm(list){let map=new Map;(list||[]).forEach(x=>{x=entry(x);if(x)map.set(x.id,x)});return[...map.values()].sort((a,b)=>a.w.localeCompare(b.w,"en",{sensitivity:"base"}))}function loadBank(){try{let x=JSON.parse(localStorage.getItem(bankKey)||"null");return Array.isArray(x)&&x.length?x:null}catch{return null}}let words=listNorm(loadBank()||BASE);function saveFav(){localStorage.setItem(favKey,JSON.stringify([...fav]))}function saveBank(){localStorage.setItem(bankKey,JSON.stringify(words.map(({w,pr,p,m,s})=>({w,pr,p,m,s}))))}function cur(){return words[idx]}function setMsg(t,bad=false){$("bankMsg").textContent=t;$("bankMsg").className="msg"+(bad?" bad":"")}function setCounts(){ $("total").textContent=words.length+" 个词";$("favN").textContent=words.filter(x=>fav.has(x.id)).length+" 个收藏" }function clearQuiz(){$("ans").value="";$("fb").textContent="";$("fb").className="fb";$("reveal").hidden=true;$("reveal").textContent=""}function setFavUi(){let on=fav.has(cur().id);[$("heart"),$("qHeart")].forEach(b=>{b.classList.toggle("on",on);b.textContent=on?"♥":"♡"});setCounts()}function render(n=0){idx=(n+words.length)%words.length;let w=cur(),num="#"+String(idx+1).padStart(2,"0");$("pos").textContent=$("qPos").textContent=num;$("part").textContent=$("qPart").textContent=w.p;$("src").textContent=$("qSrc").textContent=w.s;$("word").textContent=w.w;$("word").classList.toggle("long",w.w.length>10);$("pron").textContent=w.pr;$("mean").textContent=w.m;$("note").textContent=w.s==="自定义"?"来自自定义词库。":"";$("prompt").textContent=w.m;$("card").classList.remove("flip");clearQuiz();setFavUi();renderWordRows();$("status").textContent="当前单词："+w.w}function goRandom(){if(words.length<2)return;render(idx+Math.floor(Math.random()*(words.length-1))+1)}function goNext(){render(idx+1)}function toggleFav(){let id=cur().id;fav.has(id)?fav.delete(id):fav.add(id);saveFav();setFavUi();renderBook()}function addFav(w){if(fav.has(w.id))return false;fav.add(w.id);saveFav();setFavUi();renderBook();return true}function clean(s){return s.toLowerCase().replace(/[^a-z0-9]+/g," ").trim().replace(/\s+/g," ")}function checkAnswer(){let w=cur(),a=clean($("ans").value),t=clean(w.w);if(!a){$("fb").textContent="先写一个答案。";$("fb").className="fb bad";return}if(a===t||a.replace(/\s/g,"")===t.replace(/\s/g,"")){$("fb").textContent="答对了";$("fb").className="fb ok";$("reveal").hidden=false;$("reveal").textContent=w.w+"  "+w.pr}else{$("fb").textContent=addFav(w)?"再想一下，已加入生词本":"再想一下，已在生词本";$("fb").className="fb bad"}}function showAnswer(){let w=cur();$("reveal").hidden=false;$("reveal").textContent=w.w+"  "+w.pr;$("fb").textContent="答案已显示";$("fb").className="fb"}function renderWordRows(){$("rows").replaceChildren();words.forEach((w,n)=>{let b=document.createElement("button");b.className="row"+(n===idx?" active":"");b.innerHTML="<strong>"+w.w+"</strong><span>"+w.p+" "+w.m+"</span>";b.onclick=()=>render(n);$("rows").append(b)})}function renderBook(){$("bookList").replaceChildren();let a=words.filter(w=>fav.has(w.id));if(!a.length){let d=document.createElement("div");d.className="empty";d.textContent="还没有收藏的单词。";$("bookList").append(d);return}a.forEach(w=>{let r=document.createElement("div");r.className="bookRow";r.innerHTML="<div><strong>"+w.w+"</strong><br><span>"+w.p+" "+w.m+"</span></div>";let x=document. tokens=englishTokens(t);if(tokens.length>1)return tokens}return[{w:t,pr:"",p:"自定义",m:"待补充释义",s:"自定义"}]}function parseText(t){return t.split(/\r?\n/).flatMap(parseLine).filter(x=>x&&x.w)}function importText(replace){let a=parseText($("bankText").value);if(!a.length)return setMsg("没有识别到可导入的词。",true);if(replace)setBank(a,"已替换为 "+listNorm(a).length+" 个词。");else{let merged=[...words,...a];setBank(merged,"已导入 "+a.length+" 个词，当前词库 "+listNorm(merged).length+" 个词。");$("bankText").value=""}}function addQuick(){let w=$("quickWord").value.trim();if(!w)return setMsg("先输入英文单词。",true);setBank([...words,{w,pr:"",p:"自定义",m:$("quickMean").value.trim()||"待补充释义",s:"自定义"}],"已添加："+w);$("quickWord").value="";$("quickMean").value="";$("quickWord").focus()}function setMode(m){mode=m;$("cardMode").hidden=m==="quiz";$("quizMode").hidden=m!=="quiz";$("tabCard").classList.toggle("on",m==="card");$("tabQuiz").classList.toggle("on",m==="quiz");if(m==="quiz"){clearQuiz();setTimeout(()=>$("ans").focus(),0)}}function setList(open){$("list").hidden=!open;$("layout").classList.toggle("closed",!open);$("toggleListBtn").textContent=open?"收起词表":"展开词表"}function openBook(){renderBook();$("bookModal").hidden=false}function openBank(){renderBank();setMsg("当前词库 "+words.length+" 个词。");$("bankModal").hidden=false;$("quickWord").focus()}$("card").onclick=()=>$("card").classList.toggle("flip");$("card").onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();$("card").click()}};$("flipBtn").onclick=()=>$("card").click();$("randBtn").onclick=goRandom;$("qRandBtn").onclick=goRandom;$("nextBtn").onclick=goNext;$("qNextBtn").onclick=goNext;$("heart").onclick=toggleFav;$("qHeart").onclick=toggleFav;$("checkBtn").onclick=checkAnswer;$("ans").onkeydown=e=>{if(e.key==="Enter")checkAnswer()};$("showBtn").onclick=showAnswer;$("bookBtn").onclick=openBook;$("qBookBtn").onclick=openBook;$("closeBookBtn").onclick=()=>$("bookModal").hidden=true;$("bookModal").onclick=e=>{if(e.target===$("bookModal"))$("bookModal").hid
